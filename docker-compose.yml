services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT
      - MONGO_URI
      - JWT_SECRET
    volumes:
      - backend_logs:/app/logs

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL
    depends_on:
      - backend

volumes:
  backend_logs: